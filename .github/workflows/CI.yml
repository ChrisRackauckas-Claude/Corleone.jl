name: CI
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - 'lts'
        group:
          - Corleone
          - CorleoneOED
        include:
          - group: Corleone
            project: "@."
          - group: CorleoneOED
            project: "lib/CorleoneOED"
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      julia-version: "${{ matrix.version }}"
      group: "${{ matrix.group }}"
      project: "${{ matrix.project }}"
      coverage-directories: "src,lib/CorleoneOED/src"
    secrets: "inherit"
